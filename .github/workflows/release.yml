name: Release

# Fires on `git push origin vX.Y.Z`. Builds the wheel + release
# bundle (same script the dev container uses), then publishes a
# GitHub Release on the pushed tag with all four artifacts attached
# and autogenerated notes between this tag and the previous one.

on:
  push:
    tags: ['v*']

permissions:
  contents: write    # required to create a Release

jobs:
  release:
    name: Build + publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # autogenerated notes need history

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          # No lockfile is tracked (uv.lock is gitignored), so key the
          # cache off pyproject.toml instead of the default **/uv.lock —
          # the default glob matches nothing and hard-errors.
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies (including dev extras)
        run: uv sync --all-extras --quiet

      - name: Build wheel + release bundle (smoke-tested)
        run: PROJECT_DIR="$GITHUB_WORKSPACE" ./scripts/build_artifact.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/paige-*.whl
            dist/paige-*.whl.sha256
            dist/paige-release.tar.gz
            dist/paige-release.tar.gz.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
